on:
    push:
        branches: [desarrollo, main]
        tags:
            - 'shoot--em-up*'
    pull_request:
        branches: [desarrollo]
        paths-ignore: ['**.md']

# Variables de entorno
env:
    # Email y contraseña
    UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
    UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

    # Licencia de Unity (fichero)
    UNITY_LICENSE: ${{ secrets.UNITY_LICENSE}}

jobs:
    # tarea de tests
    test:
        name: test unity
        runs-on: ubuntu-latest
        steps:
            # Configura checkout
            - uses: actions/checkout@v4

            # Ejecuta los tests de Unity
            - name: Ejecutar tests de Unity
              uses: game-ci/unity-test-runner@v4
              id: testRunner
              with:
                githubToken: ${{ secrets.GITHUB_TOKEN }}
            
            # Subir los resultados de los tests como artefacto
            - name: Subir resultados de tests
              uses: actions/upload-artifact@v4
              with:
                name: TestResults
                path: ${{ steps.testRunner.outputs.artifactsPath }}

    # tarea de compilación
    build:
        name: Compilación de Shot 'em up'
        needs: test
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                targetPlatform:
                    # - StandaloneWindows64
                    - StandaloneLinux64
        steps:
            # Configura checkout
            - uses: actions/checkout@v4

            # Ejecuta la compilación de Unity
            - name: Compilacion de Unity
              uses: game-ci/unity-builder@v4
              with:
                targetPlatform: ${{ matrix.targetPlatform}}

            # Guarda el artefacto de compilación
            - name: Guardar artefacto de compilacion
              uses: actions/upload-artifact@v4
              with:
                name: Build-${{ matrix.targetPlatform }}
                path: build/${{ matrix.targetPlatform }}
                if-no-files-found: error


    # tarea de despliegue
    deploy:
        name: Despliegue en github
        needs: build
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/shoot--em-up')
        steps:
            # Configura checkout
            - uses: actions/checkout@v4

            # Descarga los artefactos de compilación
            - name: Descargar artefactos de compilacion
              uses: actions/download-artifact@v4
              with:
                path: all-builds

            # comprimir cada build en un zip
            - name: Comprimir builds en zip
              run: |
                mkdir zip-builds
                cd all-builds
                for dir in Build-*; do
                  if [ -d "$dir" ]; then
                    echo "Comprimiendo $dir"
                    zip -r "../zip-builds/${dir}.zip" "$dir"
                  fi
                done

            # Subir los zips a la release de github
            - name: crear release y subir zips
              uses: softprops/action-gh-release@v2
              with:
                #  Filtramos por todos los ficherosque acaban en .zip dentro de zip-builds
                files: zip-builds/*.zip
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}