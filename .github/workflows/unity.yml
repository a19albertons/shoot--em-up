on:
    push:
        branches: [desarrollo, main]
        tags:
            - 'shoot--em-up*'
    pull_request:
        branches: [desarrollo]
        paths-ignore: ['**.md']

# Variables de entorno
env:
    # Email y contraseña
    UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
    UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

    # Licencia de Unity (fichero)
    UNITY_LICENSE: ${{ secrets.UNITY_LICENSE}}

jobs:
    # tarea de tests
    test:
        name: test unity
        runs-on: ubuntu-latest
        steps:
            # Configura checkout
            - uses: actions/checkout@v4

            # Ejecuta los tests de Unity
            - name: Ejecutar tests de Unity
              uses: game-ci/unity-test-runner@v4
              id: testRunner
              with:
                githubToken: ${{ secrets.GITHUB_TOKEN }}
            
            # Subir los resultados de los tests como artefacto
            - name: Subir resultados de tests
              uses: actions/upload-artifact@v4
              with:
                name: TestResults
                path: ${{ steps.testRunner.outputs.artifactsPath }}

    # tarea de compilación
    build:
        name: Compilación de Shot 'em up'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                targetPlatform:
                    # - StandaloneWindows64
                    - StandaloneLinux64
        steps:
            # Configura checkout
            - uses: actions/checkout@v4

            # Ejecuta la compilación de Unity
            - name: Compilacion de Unity
              uses: game-ci/unity-builder@v4
              with:
                targetPlatform: ${{ matrix.targetPlatform}}

            # Guarda el artefacto de compilación
            - name: Guardar artefacto de compilacion
              uses: actions/upload-artifact@v4
              with:
                name: Build-${{ matrix.targetPlatform }}
                path: Build/${{ matrix.targetPlatform }}

